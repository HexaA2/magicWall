<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>East Coast Magic Wall</title>
  <style>
    :root {
      --bg: #121212;
      --btn: #9d4edd;
      --btn-hover: #b06cff;
      --text: #f5edff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg) 70%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

      .landing {
        text-align: center;
      }

      .title {
        margin: 0 0 14px 0;
        color: var(--text);
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.4px;
      }

    a {
      text-decoration: none;
    }

    .enter-button {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 10px;
      border: 2px solid #d6c2f8;
      background: var(--btn);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .enter-button:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1 class="title">East Coast Magic Wall</h1>
    <a class="enter-button" href="state_level_map.html">Open State Map</a>
  </div>
</body>
</html>
